        .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); } .btn-outline:hover { background: rgba(26,115,232,0.06); }

        .table-wrapper { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); max-height: 55vh; overflow-y: auto; position: relative; -webkit-overflow-scrolling: touch; }

        .table-wrapper thead { position: sticky; top: 0; z-index: 10; }

function excelSerialToDate(serial) {
    if (typeof serial !== 'number' || isNaN(serial) || serial <= 0) return serial;
    // Excel 的 1900 日期系统：1900-01-01 对应序列号 1，但 Excel 错误地认为 1900 年是闰年，所以 1900-02-28 后需校正
    // 简单处理：直接使用 (serial - 25569) * 86400000 并加上本地时区偏移
    const msPerDay = 86400000;
    const epochDays = serial - 25569; // 1970-01-01 对应的 Excel 序列号是 25569
    const utcMs = epochDays * msPerDay;
    const date = new Date(utcMs);
    // 获取本地时区的年月日
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

            function a_importFromExcel() {
    if (!permissions.import) { showToast('无导入权限', 'error'); return; }
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.xlsx,.xls';
    input.onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
            if (json.length < 2) { showToast('Excel格式错误'); return; }
            const rows = json.slice(1).filter(r => r.some(c => c !== '' && c !== null));
            const imported = rows.map(row => {
                const obj = {};
                // 为导入的档案添加默认提醒开关
                obj.contractReminder = true;
                obj.cooperationReminder = true;
                obj.completionDocReminder = true;
                a_allFields.forEach((f, idx) => {
                    let val = row[idx];
                    if (a_dateFields.includes(f.key) && typeof val === 'number' && val > 40000 && val < 80000) val = excelSerialToDate(val);
                    obj[f.key] = String(val ?? '');
                });
                return obj;
            });
            if (!imported.length) { showToast('无有效数据'); return; }
            let added = 0, updated = 0, unchanged = 0;
            imported.forEach(imp => {
                const archiveNo = imp.archiveNo.trim();
                if (!archiveNo) {
                    a_allData.push(imp);
                    added++;
                    return;
                }
                const existIdx = a_allData.findIndex(item => item.archiveNo.trim() === archiveNo);
                if (existIdx === -1) {
                    a_allData.push(imp);
                    added++;
                } else {
                    const existing = a_allData[existIdx];
                    let diff = false;
                    // 逐字段覆盖：仅当 Excel 中的字段非空时才更新
                    for (let key of Object.keys(imp)) {
                        // 跳过提醒开关字段（除非 Excel 中明确提供了值）
                        if (key === 'contractReminder' || key === 'cooperationReminder' || key === 'completionDocReminder') {
                            // 如果 Excel 中有值（true/false）则覆盖，否则保留本地
                            if (imp[key] !== undefined && imp[key] !== '') {
                                if (existing[key] != imp[key]) { diff = true; existing[key] = imp[key]; }
                            }
                            continue;
                        }
                        const excelVal = imp[key];
                        if (excelVal !== undefined && excelVal !== null && excelVal !== '') {
                            if (existing[key] != excelVal) {
                                diff = true;
                                existing[key] = excelVal;
                            }
                        }
                    }
                    if (diff) {
                        updated++;
                    } else {
                        unchanged++;
                    }
                }
            });
            a_saveLocal(a_allData);
            a_globalSearchResults = []; a_queryResults = []; a_activeSearchResults = null;
            a_refreshQueryTable();
            showToast(`导入完成：新增${added}条，更新${updated}条，无变化${unchanged}条`, 'success');
        };
        reader.readAsArrayBuffer(file);
    };
    input.click();
}

            async function a_handleBackupToCloud() {
    if (!permissions.backup) { showToast('无备份权限', 'error'); return; }
    let key = null;
    while (true) {
        const firstKey = prompt('请输入本次备份的随机加密密钥（恢复时需要提供）：');
        if (firstKey === null) { return; }
        const secondKey = prompt('请再次输入加密密钥以确认：');
        if (secondKey === null) { return; }
        if (firstKey === secondKey) {
            key = firstKey;
            break;
        } else {
            showToast('两次输入的密钥不一致，请重新输入', 'error');
        }
    }
    let success = false;
    const payload = JSON.stringify(a_allData);
    const encPayload = CryptoJS.AES.encrypt(payload, key).toString();
    const batches = [];
    let startIdx = 0;
    while (startIdx < encPayload.length) { batches.push(encPayload.slice(startIdx, startIdx + 6000)); startIdx += 6000; }
    try {
        for (let i = 0; i < batches.length; i++) { const res = await cloudUpdateRaw(getArchiveCloudKey() + '_batch' + (i+1), batches[i]); if (!res.success) throw new Error('分片写入失败'); }
        await cloudUpdateRaw(getArchiveCloudKey(), JSON.stringify({ batches: batches.length }));
        showToast('云端备份成功', 'success'); success = true;
    } catch (e) { showToast('云端备份失败', 'error'); }
    const statusText = success ? '备份成功' : '备份失败';
    const fileName = `档案管理系统_${statusText}_${getNowString()}.xlsx`;
    const fields = a_hiddenVisible ? a_allFields.map(f => f.key) : a_allFields.filter(f => !a_hiddenFields.includes(f.key)).map(f => f.key);
    a_exportWithFields(a_allData, fileName, fields);
}

// 生成差异表格HTML（用于人员数据对比弹窗）
function buildDiffTable(localNorm, remoteNorm) {
    let html = '<div class="table-wrapper"><table><thead><tr><th>序号</th><th>姓名</th><th>匹配项</th><th>差异字段</th><th>云端数据</th><th>本地数据</th></tr></thead><tbody>';
    const maxLen = Math.max(localNorm.length, remoteNorm.length);
    let idx = 1;
    for (let i = 0; i < maxLen; i++) {
        const localItem = localNorm[i] || {};
        const remoteItem = remoteNorm[i] || {};
        const nameValue = localItem.name || remoteItem.name || '-';
        const matchValue = localItem.regno || remoteItem.regno || localItem.idcard || remoteItem.idcard || '-';
        const allKeys = new Set([...Object.keys(localItem), ...Object.keys(remoteItem)]);
        for (let key of allKeys) {
            if (key === 'seq') continue;  // 忽略序号
            if (key === 'categoryOther' || key === 'positionOther' || key === 'majorOther' || key === 'levelOther' || key === 'companyOther') continue;
            const lv = (localItem[key] ?? '').toString();
            const rv = (remoteItem[key] ?? '').toString();
            if (lv !== rv) {
                const label = p_fieldLabelMap.get(key) || key;
                html += `<tr>
                    <td>${idx}</td>
                    <td>${escapeHtml(nameValue)}</td>
                    <td>${escapeHtml(matchValue)}</td>
                    <td>${escapeHtml(label)}</td>
                    <td>${escapeHtml(rv)}</td>
                    <td>${escapeHtml(lv)}</td>
                </tr>`;
                idx++;
            }
        }
    }
    html += '</tbody></table></div>';
    return html;
}

// 专用的人员数据冲突解决（保留本地原始结构）
async function resolvePersonnelConflict(localRaw, remoteRaw) {
    if (!remoteRaw) return localRaw;

    const localNorm = localRaw.map(p_normalizePersonForCompare);
    const remoteNorm = remoteRaw.map(p => ({
        ...p,
        categoryOther: '', positionOther: '', majorOther: '', levelOther: '', companyOther: ''
    }));

    const localMap = new Map();
    const remoteMap = new Map();

    // 构建键的函数：优先 regno+idcard，若均为空则使用 seq
    function getKey(item) {
        const regno = item.regno || '';
        const idcard = item.idcard || '';
        if (regno || idcard) {
            return regno + '|||' + idcard;
        }
        // 如果 regno 和 idcard 都为空，使用 seq 作为键（seq 应唯一）
        return 'seq:' + (item.seq || '');
    }

    localNorm.forEach((item, idx) => {
        const key = getKey(item);
        localMap.set(key, { norm: item, raw: localRaw[idx] });
    });
    remoteNorm.forEach((item, idx) => {
        const key = getKey(item);
        remoteMap.set(key, { norm: item, raw: remoteRaw[idx] });
    });

    // 增量添加
    let added = [];
    for (let [key, remoteObj] of remoteMap) {
        if (!localMap.has(key)) {
            localRaw.push(remoteObj.raw);
            added.push(remoteObj.raw);
            localMap.set(key, { norm: remoteObj.norm, raw: remoteObj.raw });
        }
    }
    if (added.length > 0) {
        showToast(`人员系统：云端新增 ${added.length} 条记录已自动添加到本地`, 'success');
    }

    // 收集差异（忽略序号字段）
    let diffRows = [];
    for (let [key, remoteObj] of remoteMap) {
        if (localMap.has(key)) {
            const localObj = localMap.get(key);
            const localNormItem = localObj.norm;
            const remoteNormItem = remoteObj.norm;
            const allKeys = new Set([...Object.keys(localNormItem), ...Object.keys(remoteNormItem)]);
            for (let field of allKeys) {
                if (field === 'seq') continue;
                if (field === 'categoryOther' || field === 'positionOther' || field === 'majorOther' || field === 'levelOther' || field === 'companyOther') continue;
                const lv = localNormItem[field] ?? '';
                const rv = remoteNormItem[field] ?? '';
                if (lv != rv) {
                    const fieldLabel = p_fieldLabelMap.get(field) || field;
                    const nameValue = localObj.raw.name || remoteObj.raw.name || '-';
                    const matchValue = localObj.raw.regno || remoteObj.raw.regno || localObj.raw.idcard || remoteObj.raw.idcard || (localObj.raw.seq || '');
                    diffRows.push({
                        nameValue, matchValue,
                        fieldLabel, remoteVal: String(rv), localVal: String(lv)
                    });
                }
            }
        }
    }

    if (diffRows.length === 0) {
        if (added.length > 0) return localRaw;
        return localRaw;
    }

    let diffHtml = '<div class="table-wrapper"><table><thead><tr><th>序号</th><th>姓名</th><th>匹配项</th><th>差异字段</th><th>云端数据</th><th>本地数据</th></tr></thead><tbody>';
    let idx = 1;
    for (let row of diffRows) {
        diffHtml += `<tr>
            <td>${idx}</td>
            <td>${escapeHtml(row.nameValue)}</td>
            <td>${escapeHtml(row.matchValue)}</td>
            <td>${escapeHtml(row.fieldLabel)}</td>
            <td>${escapeHtml(row.remoteVal)}</td>
            <td>${escapeHtml(row.localVal)}</td>
        </tr>`;
        idx++;
    }
    diffHtml += '</tbody></table></div>';

    return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.display = 'flex';
        overlay.innerHTML = `<div class="modal" style="max-width:1000px;"><h3>人员数据差异对比</h3>${diffHtml}<div class="modal-actions"><button class="btn btn-outline" id="diffKeepLocal">保留本地数据</button><button class="btn btn-primary" id="diffUseRemote">使用云端数据覆盖差异字段</button></div></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#diffKeepLocal').onclick = () => {
            document.body.removeChild(overlay);
            resolve(localRaw);
        };
        overlay.querySelector('#diffUseRemote').onclick = () => {
            for (let [key, remoteObj] of remoteMap) {
                if (localMap.has(key)) {
                    const localRawItem = localMap.get(key).raw;
                    const remoteRawItem = remoteObj.raw;
                    const allKeys = new Set([...Object.keys(localRawItem), ...Object.keys(remoteRawItem)]);
                    for (let field of allKeys) {
                        if (field === 'seq') continue;
                        if (localRawItem[field] != remoteRawItem[field]) {
                            localRawItem[field] = remoteRawItem[field];
                        }
                    }
                }
            }
            document.body.removeChild(overlay);
            showToast('已将云端差异字段更新到本地人员数据', 'success');
            resolve(localRaw);
        };
    });
}

            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
            if (json.length < 2) { showToast('Excel格式错误'); return; }
            const rows = json.slice(1).filter(r => r.some(c => c !== '' && c !== null));
            const imported = rows.map(row => {
                const v = row[7]; let vs = '';
                if (typeof v === 'number' && isExcelSerialNumber(v)) vs = excelSerialToDate(v);
                else if (v) vs = String(v);
                return {
                    seq: String(row[0] || ''),
                    name: String(row[1] || ''),
                    idcard: String(row[2] || ''),
                    category: String(row[3] || ''),

                };
            });

            // 构建身份证+注册号的索引
            const matchMap = new Map();
            p_allData.forEach((item, idx) => {
                const key = (item.idcard || '').trim() + '|||' + (item.regno || '').trim();
                if (key !== '|||') matchMap.set(key, idx);
            });

            const newData = [...p_allData];
            let updateCount = 0, addCount = 0;

            imported.forEach(imp => {
                const key = (imp.idcard || '').trim() + '|||' + (imp.regno || '').trim();
                if (key !== '|||' && matchMap.has(key)) {
                    const idx = matchMap.get(key);
                    // 更新现有记录（序号可能调整，但这里保留新序号或原序号？导入数据可能自带序号，这里使用导入的序号，后续可统一补位）
                    newData[idx] = imp;
                    updateCount++;
                } else {
                    newData.push(imp);
                    addCount++;
                }
            });

            if (updateCount === 0 && addCount === 0) {
                showToast('导入数据与现有数据无差异', 'info');
                return;
            }
            if (confirm(`即将更新 ${updateCount} 条，新增 ${addCount} 条。确定继续？`)) {

                p_activeSearchResults = null;
                p_refreshQueryTable();
                showToast(`导入完成：更新${updateCount}条，新增${addCount}条`, 'success');

            function r_getBidOpeningStatus(person) {
                if (person.remarks && person.remarks.includes('不投了')) return '已取消投标';
                if (!person.bidOpeningDate) return '';
                const now = new Date();
                const bidDate = new Date(person.bidOpeningDate);
                if (isNaN(bidDate.getTime())) return '';
                const diffMs = bidDate.getTime() - now.getTime();
                if (diffMs < 0) {
                    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const bidDayStart = new Date(bidDate.getFullYear(), bidDate.getMonth(), bidDate.getDate());
                    if (todayStart.getTime() === bidDayStart.getTime()) {
                        const overMs = Math.abs(diffMs);
                        const overHours = Math.floor(overMs / (1000 * 60 * 60));
                        const overMinutes = Math.floor((overMs % (1000 * 60 * 60)) / (1000 * 60));
                        return `今日开标，已超过规定开标${overHours}时${overMinutes}分`;
                    }
                    return '已经开标';
                } else {
                    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const bidDayStart = new Date(bidDate.getFullYear(), bidDate.getMonth(), bidDate.getDate());
                    if (todayStart.getTime() === bidDayStart.getTime()) {
                        const remainHours = Math.floor(diffMs / (1000 * 60 * 60));
                        const remainMinutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                        return `今日开标，还有${remainHours}时${remainMinutes}分`;

            function r_importFromExcel() {
    if (!permissions.import) { showToast('无导入权限', 'error'); return; }
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.xlsx,.xls';
    input.onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
            if (json.length < 2) { showToast('Excel格式错误'); return; }
            const rows = json.slice(1).filter(r => r.some(c => c !== '' && c !== null));
            const imported = rows.map(row => {
                const regDateRaw = row[5]; let regDateStr = '';
                if (typeof regDateRaw === 'number' && isExcelSerialNumber(regDateRaw)) regDateStr = excelSerialToDate(regDateRaw);
                else if (regDateRaw) regDateStr = String(regDateRaw);
                const bidDateRaw = row[8]; let bidDateStr = '';
                if (typeof bidDateRaw === 'number' && isExcelSerialNumber(bidDateRaw)) { const d = excelSerialToDate(bidDateRaw); bidDateStr = d + 'T00:00'; }
                else if (bidDateRaw) bidDateStr = String(bidDateRaw);
                const remarks2 = (row.length > 14 && row[14] !== undefined && row[14] !== null) ? String(row[14]) : '';
                return {
                    seq: String(row[0] || ''),
                    projectName: String(row[1] || ''),
                    client: String(row[2] || ''),
                    projectManager: String(row[3] || ''),
                    materials: String(row[4] || ''),
                    registrationDate: regDateStr,
                    bidOpeningMethod: String(row[6] || ''),
                    bidOpeningAddress: String(row[7] || ''),
                    bidOpeningDate: bidDateStr,
                    deposit: String(row[9] || ''),
                    maxPrice: String(row[10] || ''),
                    announcementUrl: String(row[11] || ''),
                    company: String(row[12] || ''),
                    remarks: String(row[13] || ''),
                    remarks2: remarks2
                };
            });
            if (!imported.length) { showToast('无有效数据'); return; }
            let updatedCount = 0, addedCount = 0;
            const newData = [...r_allData];
            imported.forEach(imp => {
                const seq = imp.seq;
                const existingIndex = newData.findIndex(d => d.seq === seq);
                if (existingIndex >= 0) {
                    const existing = newData[existingIndex];
                    let diff = false;
                    // 逐字段覆盖：仅当 Excel 中的字段非空时才更新
                    for (let key of Object.keys(imp)) {
                        const excelVal = imp[key];
                        if (excelVal !== undefined && excelVal !== null && excelVal !== '') {
                            if (existing[key] != excelVal) {
                                diff = true;
                                existing[key] = excelVal;
                            }
                        }
                    }
                    if (diff) {
                        updatedCount++;
                    }
                } else {
                    newData.push(imp);
                    addedCount++;
                }
            });
            if (updatedCount === 0 && addedCount === 0) {
                showToast('导入数据与现有数据一致，无需更新', 'info');
                return;
            }
            if (confirm(`即将更新 ${updatedCount} 条，新增 ${addedCount} 条。确定继续？`)) {
                r_allData = newData;
                r_saveLocal(r_allData);
                r_activeSearchResults = null;
                r_refreshQueryTable();
                showToast(`导入完成：更新${updatedCount}条，新增${addedCount}条`, 'success');
            }
        };
        reader.readAsArrayBuffer(file);
    };
    input.click();
}

            async function r_handleBackupToCloud() {
    if (!permissions.backup) { showToast('无备份权限', 'error'); return; }
    let key = null;
    while (true) {
        const firstKey = prompt('请输入本次备份的随机加密密钥（恢复时需要提供）：');
        if (firstKey === null) { return; }
        const secondKey = prompt('请再次输入加密密钥以确认：');
        if (secondKey === null) { return; }
        if (firstKey === secondKey) {
            key = firstKey;
            break;
        } else {
            showToast('两次输入的密钥不一致，请重新输入', 'error');
        }
    }
    let success = false;
    const cloudArray = r_allData.map(item => ({
        "序号": item.seq,
        "工程名称": item.projectName,
        "委托人": item.client,
        "项目经理": item.projectManager,
        "资料": item.materials,
        "报名日期": item.registrationDate,
        "开标方式": item.bidOpeningMethod,
        "开标地址": item.bidOpeningAddress,
        "开标日期": item.bidOpeningDate,
        "保证金": item.deposit,
        "最高限价": item.maxPrice,
        "公告地址": item.announcementUrl,
        "所属公司": item.company,
        "备注": item.remarks,
        "备注2": item.remarks2 || ''
    }));
    const payload = JSON.stringify(cloudArray);
    const encPayload = CryptoJS.AES.encrypt(payload, key).toString();
    const batches = [];
    let startIdx = 0;
    while (startIdx < encPayload.length) { batches.push(encPayload.slice(startIdx, startIdx + 6000)); startIdx += 6000; }
    try {
        for (let i = 0; i < batches.length; i++) { const res = await cloudUpdateRaw(getRegCloudKey() + '_batch' + (i+1), batches[i]); if (!res.success) throw new Error('分片写入失败'); }
        await cloudUpdateRaw(getRegCloudKey(), JSON.stringify({ batches: batches.length }));
        showToast('云端备份成功', 'success'); success = true;
    } catch (e) { showToast('云端备份失败', 'error'); }
    const statusText = success ? '备份成功' : '备份失败';
    const fileName = `报名管理系统_${statusText}_${getNowString()}.xlsx`;
    const fields = (r_remarks2Visible && permissions.showSensitive) ? [...r_allFieldsExport.map(f => f.key), 'remarks2'] : r_allFieldsExport.map(f => f.key);
    r_exportWithFields(r_allData, fileName, fields);
}


       async function r_handleRestoreFromCloud() {
    if (!permissions.restore) { showToast('无恢复权限', 'error'); return; }
    const key = prompt('请输入备份时使用的随机加密密钥：'); if (!key) return;
    showLoginPasswordModal(async (success) => {
        if (!success) return;
        try {
            const metaRaw = await cloudReadRaw(getRegCloudKey()); if (!metaRaw) { showToast('云端无数据', 'info'); return; }
            const meta = JSON.parse(metaRaw); let fullEnc = '';
            for (let i = 1; i <= meta.batches; i++) { const part = await cloudReadRaw(getRegCloudKey() + '_batch' + i); if (part) fullEnc += part; }
            const decPayload = CryptoJS.AES.decrypt(fullEnc, key).toString(CryptoJS.enc.Utf8);
            if (!decPayload) { showToast('解密密钥错误', 'error'); return; }
            const cloudArray = JSON.parse(decPayload);
            const cloudData = cloudArray.map(item => ({
                seq: String(item["序号"] || ""), projectName: item["工程名称"] || "", client: item["委托人"] || "", projectManager: item["项目经理"] || "", materials: item["资料"] || "", registrationDate: item["报名日期"] || "", bidOpeningMethod: item["开标方式"] || "", bidOpeningAddress: item["开标地址"] || "", bidOpeningDate: item["开标日期"] || "", deposit: item["保证金"] || "", maxPrice: item["最高限价"] || "", announcementUrl: item["公告地址"] || "", company: item["所属公司"] || "", remarks: item["备注"] || "", remarks2: item["备注2"] || ""
            }));

            if (confirm(`云端${cloudData.length}条，本地${r_allData.length}条，覆盖？`)) { r_allData = cloudData; r_saveLocal(r_allData); r_activeSearchResults = null; r_refreshQueryTable(); showToast('已恢复', 'success'); }
        } catch (e) { showToast('恢复失败，密钥错误或数据格式异常', 'error'); }

            async function fetchCloudData(cloudKey, projectCode, mapFn) {
                try {
                    const metaRaw = await cloudReadRaw(cloudKey); if (!metaRaw) return null;
                    const meta = JSON.parse(metaRaw); let fullEnc = '';
                    for (let i = 1; i <= meta.batches; i++) { const part = await cloudReadRaw(cloudKey + '_batch' + i); if (part) fullEnc += part; }
                    const decPayload = CryptoJS.AES.decrypt(fullEnc, projectCode).toString(CryptoJS.enc.Utf8);
                    if (!decPayload) return null;
                    const rawData = JSON.parse(decPayload);
                    return mapFn ? mapFn(rawData) : rawData;
                } catch (e) { return null; }
            }

            async function promptUpdateFromCloud(cloudData, localData, systemName) {
    let matchKey = '', nameKey = '';
    if (systemName === '档案') {
        matchKey = 'archiveNo';
        nameKey = 'engName';
    } else if (systemName === '报名') {
        matchKey = 'seq';
        nameKey = 'projectName';
    } else if (systemName === '人员') {
        matchKey = 'regno';
        nameKey = 'name';
    }

    const localMap = new Map();
    const remoteMap = new Map();
    if (systemName === '人员') {
        localData.forEach(item => {
            const key = (item.regno || '') + '|||' + (item.idcard || '');
            if (key !== '|||') localMap.set(key, item);
        });
        cloudData.forEach(item => {
            const key = (item.regno || '') + '|||' + (item.idcard || '');
            if (key !== '|||') remoteMap.set(key, item);
        });
    } else {
        localData.forEach(item => {
            const key = item[matchKey] || '';
            if (key) localMap.set(key, item);
        });
        cloudData.forEach(item => {
            const key = item[matchKey] || '';
            if (key) remoteMap.set(key, item);
        });
    }

    // 增量添加
    let addedCount = 0;
    for (let [key, remoteItem] of remoteMap) {
        if (!localMap.has(key)) {
            localData.push(remoteItem);
            addedCount++;
            if (systemName === '人员') {
                const k = (remoteItem.regno || '') + '|||' + (remoteItem.idcard || '');
                if (k !== '|||') localMap.set(k, remoteItem);
            } else {
                const k = remoteItem[matchKey] || '';
                if (k) localMap.set(k, remoteItem);
            }
        }
    }
    if (addedCount > 0) {
        showToast(`${systemName}系统：云端新增 ${addedCount} 条记录已自动添加到本地`, 'success');
    }

    // 收集差异行
    let diffRows = [];
    let labelMap;
    if (systemName === '档案') labelMap = a_fieldLabelMap;
    else if (systemName === '报名') labelMap = r_fieldLabelMap;
    else labelMap = p_fieldLabelMap;

    for (let [key, remoteItem] of remoteMap) {
        if (localMap.has(key)) {
            const localItem = localMap.get(key);
            const allKeys = new Set([...Object.keys(localItem), ...Object.keys(remoteItem)]);
            for (let field of allKeys) {
                if (systemName === '人员' && field === 'seq') continue;
                if (field === 'categoryOther' || field === 'positionOther' || field === 'majorOther' || field === 'levelOther' || field === 'companyOther') continue;
                const localVal = localItem[field] ?? '';
                const remoteVal = remoteItem[field] ?? '';
                if (localVal != remoteVal) {
                    const fieldLabel = labelMap.get(field) || field;
                    let nameValue = localItem[nameKey] || remoteItem[nameKey] || '-';
                    let matchValue = '';
                    if (systemName === '档案') matchValue = localItem.archiveNo || remoteItem.archiveNo || '-';
                    else if (systemName === '报名') matchValue = localItem.seq || remoteItem.seq || '-';
                    else matchValue = localItem.regno || remoteItem.regno || localItem.idcard || remoteItem.idcard || '-';
                    diffRows.push({
                        nameValue, matchValue,
                        fieldLabel, remoteVal: String(remoteVal), localVal: String(localVal)
                    });
                }
            }
        }
    }

    if (diffRows.length === 0) {
        return addedCount > 0;
    }

    // 构建表格 - 使用完整HTML字符串，确保每个单元格独立
    let tableHtml = '<div class="table-wrapper">';
    tableHtml += '<table style="border-collapse:collapse; width:100%;">';
    tableHtml += '<thead><tr>';
    tableHtml += '<th>序号</th><th>姓名/工程名称</th><th>匹配项</th><th>差异字段</th><th>云端数据</th><th>本地数据</th>';
    tableHtml += '</tr></thead><tbody>';
    let idx = 1;
    for (let row of diffRows) {
        tableHtml += '<tr>';
        tableHtml += `<td style="border:1px solid #ddd; padding:6px;">${idx}</td>`;
        tableHtml += `<td style="border:1px solid #ddd; padding:6px;">${escapeHtml(row.nameValue)}</td>`;
        tableHtml += `<td style="border:1px solid #ddd; padding:6px;">${escapeHtml(row.matchValue)}</td>`;
        tableHtml += `<td style="border:1px solid #ddd; padding:6px;">${escapeHtml(row.fieldLabel)}</td>`;
        tableHtml += `<td style="border:1px solid #ddd; padding:6px;">${escapeHtml(row.remoteVal)}</td>`;
        tableHtml += `<td style="border:1px solid #ddd; padding:6px;">${escapeHtml(row.localVal)}</td>`;
        tableHtml += '</tr>';
        idx++;
    }
    tableHtml += '</tbody></table></div>';

    const countMsg = `云端${systemName}数据${cloudData.length}条，本地${localData.length}条。${addedCount > 0 ? `已自动添加新增记录 ${addedCount} 条。` : ''}`;
    
    return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.display = 'flex';
        overlay.innerHTML = `<div class="modal" style="max-width:1000px;">
            <h3>数据差异提醒 - ${systemName}</h3>
            <p>${countMsg}</p>
            ${tableHtml}
            <div class="modal-actions">
                <button class="btn btn-outline" id="diffIgnoreBtn">忽略，保留本地差异</button>
                <button class="btn btn-primary" id="diffUpdateBtn">更新差异字段为云端值</button>
            </div>
        </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#diffIgnoreBtn').onclick = () => {
            document.body.removeChild(overlay);
            resolve(addedCount > 0);
        };
        overlay.querySelector('#diffUpdateBtn').onclick = () => {
            // 覆盖差异字段
            for (let [key, remoteItem] of remoteMap) {
                if (localMap.has(key)) {
                    const localItem = localMap.get(key);
                    const allKeys = new Set([...Object.keys(localItem), ...Object.keys(remoteItem)]);
                    for (let field of allKeys) {

            async function resolveDataConflict(localData, remoteData, systemName) {
    if (!remoteData) {
        showToast(`无法获取云端数据，将加载本地${systemName}数据`, 'info');
        return localData;
    }

    let matchKey = '', nameKey = '';
    if (systemName === '档案') {
        matchKey = 'archiveNo';
        nameKey = 'engName';
    } else if (systemName === '报名') {
        matchKey = 'seq';
        nameKey = 'projectName';
    } else if (systemName === '人员') {
        matchKey = 'regno';
        nameKey = 'name';
    }

    // 构建映射
    const localMap = new Map();
    const remoteMap = new Map();
    if (systemName === '人员') {
        localData.forEach(item => {
            const key = (item.regno || '') + '|||' + (item.idcard || '');
            if (key !== '|||') localMap.set(key, item);
        });
        remoteData.forEach(item => {
            const key = (item.regno || '') + '|||' + (item.idcard || '');
            if (key !== '|||') remoteMap.set(key, item);
        });
    } else {
        localData.forEach(item => {
            const key = item[matchKey] || '';
            if (key) localMap.set(key, item);
        });
        remoteData.forEach(item => {
            const key = item[matchKey] || '';
            if (key) remoteMap.set(key, item);
        });
    }

    // 第一步：增量添加
    const toAdd = [];
    for (let [key, remoteItem] of remoteMap) {
        if (!localMap.has(key)) {
            toAdd.push(remoteItem);
        }
    }
    if (toAdd.length > 0) {
        localData.push(...toAdd);
        showToast(`${systemName}系统：云端新增 ${toAdd.length} 条记录已自动添加到本地`, 'success');
        // 重新构建映射
        if (systemName === '人员') {
            localData.forEach(item => {
                const k = (item.regno || '') + '|||' + (item.idcard || '');
                if (k !== '|||') localMap.set(k, item);
            });
        } else {
            localData.forEach(item => {
                const k = item[matchKey] || '';
                if (k) localMap.set(k, item);
            });
        }
    }

    // 第二步：收集内容差异（每个字段单独记录）
    let diffRows = []; // 每个元素为 { nameValue, matchValue, fieldLabel, remoteVal, localVal }
    for (let [key, remoteItem] of remoteMap) {
        if (localMap.has(key)) {
            const localItem = localMap.get(key);
            const allKeys = new Set([...Object.keys(localItem), ...Object.keys(remoteItem)]);
            for (let field of allKeys) {
                // 人员系统跳过序号字段
                if (systemName === '人员' && field === 'seq') continue;
                const localVal = localItem[field] ?? '';
                const remoteVal = remoteItem[field] ?? '';
                if (localVal != remoteVal) {
                    // 获取字段标签
                    let labelMap;
                    if (systemName === '档案') labelMap = a_fieldLabelMap;
                    else if (systemName === '报名') labelMap = r_fieldLabelMap;
                    else labelMap = p_fieldLabelMap;
                    const fieldLabel = labelMap.get(field) || field;
                    // 名称和匹配项
                    let nameValue = localItem[nameKey] || remoteItem[nameKey] || '-';
                    let matchValue = '';
                    if (systemName === '档案') matchValue = localItem.archiveNo || remoteItem.archiveNo || '-';
                    else if (systemName === '报名') matchValue = localItem.seq || remoteItem.seq || '-';
                    else matchValue = localItem.regno || remoteItem.regno || localItem.idcard || remoteItem.idcard || '-';
                    diffRows.push({
                        nameValue, matchValue,
                        fieldLabel, remoteVal: String(remoteVal), localVal: String(localVal)
                    });
                }
            }
        }
    }

    if (diffRows.length === 0) {
        showToast(`${systemName}系统：数据已同步，无内容差异`, 'info');
        return localData;
    }

    // 构建明细表格
    let diffHtml = '<div class="table-wrapper"><table><thead><tr><th>序号</th><th>姓名/工程名称</th><th>匹配项</th><th>差异字段</th><th>云端数据</th><th>本地数据</th></tr></thead><tbody>';
    let idx = 1;
    for (let row of diffRows) {
        diffHtml += `<tr>
            <td>${idx}</td>
            <td>${escapeHtml(row.nameValue)}</td>
            <td>${escapeHtml(row.matchValue)}</td>
            <td>${escapeHtml(row.fieldLabel)}</td>
            <td>${escapeHtml(row.remoteVal)}</td>
            <td>${escapeHtml(row.localVal)}</td>
        </tr>`;
        idx++;
    }
    diffHtml += '</tbody></tr></div>';

    return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.display = 'flex';
        overlay.innerHTML = `<div class="modal" style="max-width:1000px;"><h3>数据差异对比 - ${systemName}</h3><p>以下记录存在内容差异，请选择处理方式：</p>${diffHtml}<div class="modal-actions"><button class="btn btn-outline" id="diffKeepLocal">保留本地数据（不更新）</button><button class="btn btn-primary" id="diffUseRemote">使用云端数据覆盖差异字段</button></div></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#diffKeepLocal').onclick = () => {
            document.body.removeChild(overlay);
            showToast(`已保留本地${systemName}数据`, 'info');
            resolve(localData);
        };
        overlay.querySelector('#diffUseRemote').onclick = () => {
            // 将云端差异字段覆盖到本地（需要回原记录）
            for (let [key, remoteItem] of remoteMap) {
                if (localMap.has(key)) {
                    const localItem = localMap.get(key);
                    const allKeys = new Set([...Object.keys(localItem), ...Object.keys(remoteItem)]);
                    for (let field of allKeys) {
                        if (systemName === '人员' && field === 'seq') continue;
                        if (localItem[field] != remoteItem[field]) {
                            localItem[field] = remoteItem[field];
                        }
                    }
                }
            }
            document.body.removeChild(overlay);
            showToast(`已将云端差异字段更新到本地${systemName}数据`, 'success');
            resolve(localData);
        };
    });
}
